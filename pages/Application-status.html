<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Application Status</title>
<link rel="stylesheet" href="application status.css">
</head>

<body>

<div class="container">

<h1>💼 Application Status</h1>
<p class="subtitle">🌐 Universal Job Portal</p>

<div class="status-card">

<label>📄 Enter Application ID</label>

<input type="text" id="appId" placeholder="Example: UJP101">

<button onclick="checkStatus()">🔍 Check Status</button>

<div id="result"></div>

<div class="progress">
<div class="step">📩 Applied</div>
<div class="step">🕒 Review</div>
<div class="step">📅 Interview</div>
<div class="step">🎉 Selected</div>
</div>

</div>

</div>

<script src="application status.js"></script>

</body>
</html>
